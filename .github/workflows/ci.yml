name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check dlpscan/ tests/

      - name: Type check with mypy
        run: mypy dlpscan/ --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          coverage run -m unittest discover -s tests -p "unit.py" -v 2>&1 | tee unit-results.txt
          coverage report --show-missing | tee coverage-report.txt
          coverage xml -o coverage.xml

      - name: Run integration tests
        run: python -m unittest discover -s tests -p "test_integration.py" -v 2>&1 | tee integration-results.txt

      - name: Run benchmarks (non-blocking)
        run: python -m unittest discover -s tests -p "benchmarks.py" -v 2>&1 | tee benchmark-results.txt || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            unit-results.txt
            integration-results.txt
            benchmark-results.txt
            benchmark-results.json
            coverage-report.txt
            coverage.xml
          retention-days: 14
